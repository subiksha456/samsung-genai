<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Samsung GenAI — Live Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="brand">
    <span class="samsung-mark">SAMSUNG</span>
    <span class="brand-title">GenAI Program — Live Scoreboard</span>
  </div>
  <div class="header-right">
    <span class="led"></span>
    <span class="updated" id="updated">—</span>
  </div>
</header>

<div class="wrap">
  <div class="stats-bar">
    <div class="stat">
      <div class="num" id="stat-total">–</div>
      <div class="label">Total Students</div>
    </div>
  </div>

  <div class="day-stats-bar" id="day-stats-bar"></div>

  <div id="content">
    <div class="msg">Loading scoreboard…</div>
  </div>

  <footer>
    Auto-refreshes every 20 seconds &nbsp;·&nbsp; reads each student's GitHub fork directly
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
