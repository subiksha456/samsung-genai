<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hallucination, Bias & Guardrails — Samsung GenAI Program</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0F1A;--card:#141B2D;--card2:#1A2235;--accent:#00D4AA;--accent2:#0099CC;--white:#FFFFFF;--text:#BBC8D8;--dim:#7A8FA6;--danger:#EF4444;--warn:#F59E0B;--success:#10B981;--border:#1E2A3D}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw}

/* progress + counter */
#progress-bar{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:100;transition:width .35s ease}
#counter{position:fixed;bottom:20px;left:28px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--dim);z-index:100}
#nav-btns{position:fixed;bottom:20px;right:28px;display:flex;gap:10px;z-index:100}
.nav-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.nav-btn:hover{border-color:var(--accent);background:var(--card2)}
.nav-btn:disabled{opacity:.25;cursor:default}
#brand{position:fixed;top:20px;left:28px;font-size:12px;font-weight:700;color:var(--dim);letter-spacing:1px;z-index:100}
#brand span{color:var(--accent)}

/* slides */
.slide{position:fixed;top:0;left:0;width:100vw;height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 90px;opacity:0;transition:opacity .35s ease}
.slide.active{display:flex;opacity:1}
.slide-inner{max-width:1100px;width:100%}

/* TITLE slide */
.s-title{align-items:center;text-align:center}
.kicker{display:inline-block;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent)40;background:var(--accent)15;padding:6px 18px;border-radius:20px;margin-bottom:28px}
.s-title h1{font-size:56px;font-weight:800;color:var(--white);line-height:1.15;margin-bottom:20px}
.s-title .subtitle{font-size:20px;color:var(--dim);max-width:720px}

/* DIVIDER slide */
.s-divider{align-items:flex-start}
.div-num{font-size:180px;font-weight:800;color:var(--accent);opacity:.12;line-height:1;position:absolute;top:80px;right:90px}
.div-num-small{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--accent);font-weight:700;letter-spacing:2px;margin-bottom:18px}
.s-divider h1{font-size:64px;font-weight:800;color:var(--white);margin-bottom:16px}
.s-divider .subtitle{font-size:22px;color:var(--dim);max-width:640px}
.div-bar{width:64px;height:4px;background:var(--accent);border-radius:2px;margin-bottom:24px}

/* DEFINITION slide */
.s-def h2{font-size:34px;font-weight:800;color:var(--white);margin-bottom:22px}
.def-text{font-size:19px;line-height:1.6;color:var(--text);margin-bottom:14px}
.def-tagline{font-size:17px;font-style:italic;color:var(--accent);margin-bottom:32px}
.chat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 28px;max-width:640px}
.chat-line{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.chat-line:last-child{margin-bottom:0}
.chat-role{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);min-width:44px;padding-top:3px}
.chat-text{font-size:15.5px;color:var(--white);line-height:1.55}
.chat-line.ai .chat-role{color:var(--accent2)}
.verdict-icon{font-size:20px;margin-left:8px}

/* CASE slide */
.s-case h2{font-size:30px;font-weight:800;color:var(--white);margin-bottom:6px}
.case-kicker{display:inline-block;font-size:13px;font-weight:700;color:var(--warn);background:var(--warn)15;border:1px solid var(--warn)40;padding:5px 14px;border-radius:20px;margin-bottom:24px}
.case-body{font-size:18px;line-height:1.75;color:var(--text);max-width:820px;margin-bottom:24px}
.case-lesson{background:var(--accent)0F;border-left:4px solid var(--accent);border-radius:0 12px 12px 0;padding:18px 24px;max-width:820px}
.case-lesson b{color:var(--accent);font-size:12px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px}
.case-lesson span{font-size:17px;color:var(--white);line-height:1.5}

/* GRID slide */
.s-grid h2{font-size:32px;font-weight:800;color:var(--white);margin-bottom:28px}
.grid-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.grid-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.grid-card h4{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:8px}
.grid-card p{font-size:13.5px;color:var(--text);line-height:1.55;margin-bottom:10px}
.grid-card .ex{font-size:12.5px;color:var(--dim);font-style:italic;border-top:1px solid var(--border);padding-top:10px}

/* CHECKLIST slide */
.s-check h2{font-size:32px;font-weight:800;color:var(--white);margin-bottom:28px}
.check-list{display:flex;flex-direction:column;gap:12px;max-width:640px}
.check-item{display:flex;align-items:center;gap:14px;font-size:17px;color:var(--white);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
.check-item .ico{color:var(--success);font-size:18px;flex-shrink:0}

/* SUMMARY slide */
.s-summary{align-items:center;text-align:center}
.s-summary h2{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:24px}
.summary-quote{font-size:32px;font-weight:700;color:var(--white);line-height:1.5;max-width:820px;border:1px solid var(--accent)40;background:var(--accent)0A;border-radius:18px;padding:44px 48px}

/* CLOSING slide */
.s-closing h2{font-size:44px;font-weight:800;color:var(--white);margin-bottom:14px}
.closing-intro{font-size:19px;color:var(--dim);margin-bottom:28px}
.closing-points{display:flex;flex-direction:column;gap:12px;margin-bottom:32px}
.closing-point{font-size:18px;color:var(--text);padding-left:24px;position:relative}
.closing-point::before{content:"→";position:absolute;left:0;color:var(--accent);font-weight:700}
.closing-footer{font-size:17px;color:var(--accent);font-weight:600;border-top:1px solid var(--border);padding-top:24px}
</style>
</head>
<body>

<div id="progress-bar"></div>
<div id="brand">Samsung <span>GenAI</span> Program</div>
<div id="counter">1 / 1</div>
<div id="nav-btns">
  <button class="nav-btn" id="prev-btn" onclick="go(-1)">‹</button>
  <button class="nav-btn" id="next-btn" onclick="go(1)">›</button>
</div>

<div id="slides"></div>

<script>
const SLIDES = [
  {type:'title', kicker:'Samsung GenAI Program', title:'Hallucination, Bias &amp; Guardrails', subtitle:'The 3 concepts every fresher needs before touching AI in the real world'},

  // ═══ PART 1 — HALLUCINATION ═══
  {type:'divider', num:'01', title:'Hallucination', subtitle:'When AI sounds confident — but is simply wrong'},
  {type:'definition', title:'What is Hallucination?',
    def:'AI generates incorrect, made-up, or misleading information — and presents it as if it were true.',
    tagline:'&ldquo;AI sounds confident, but the answer is wrong.&rdquo;',
    example:{user:'Who invented Python in 2020?', ai:'Python was invented by Elon Musk in 2020.', verdict:'❌'}},
  {type:'case', title:'Why this matters — a real case', kicker:'Air Canada · 2024',
    body:'Air Canada&rsquo;s support chatbot told a grieving customer he could claim a bereavement discount retroactively &mdash; a policy that never actually existed. The airline argued in tribunal that the chatbot was &ldquo;a separate legal entity&rdquo; responsible for its own words. The tribunal rejected that outright and ordered Air Canada to pay.',
    lesson:'A company is legally responsible for what its AI says &mdash; even when the AI made it up.'},
  {type:'grid', title:'4 Types of Hallucination', items:[
    {name:'Factual', desc:'Wrong facts, dates, names, or numbers', example:'&ldquo;India has 35 states.&rdquo;'},
    {name:'Citation', desc:'Invents books, papers, or sources that don&rsquo;t exist', example:'&ldquo;According to a Harvard study published in 2028&hellip;&rdquo;'},
    {name:'Context', desc:'Misreads what you actually asked', example:'Answers about Java coffee instead of Java programming'},
    {name:'Logical', desc:'Facts are right, but the reasoning breaks', example:'&ldquo;All birds fly, so penguins fly.&rdquo;'},
  ]},
  {type:'checklist', title:'How to Reduce Hallucination', items:[
    'Write clear, specific prompts',
    'Provide enough context and relevant data',
    'Ask the AI to say &ldquo;I don&rsquo;t know&rdquo; if unsure',
    'Verify important facts from trusted sources',
    'Use RAG (grounding) for enterprise applications',
    'Ask for sources or citations &mdash; then check them',
  ]},
  {type:'summary', title:'Hallucination, in one line', quote:'AI confidently generates information that is false, fabricated, or misleading.'},

  // ═══ PART 2 — BIAS ═══
  {type:'divider', num:'02', title:'Bias', subtitle:'When AI treats identical situations unfairly'},
  {type:'definition', title:'What is Bias?',
    def:'AI produces unfair, one-sided, or prejudiced results &mdash; because of the data it was trained on, or how it was designed.',
    tagline:'&ldquo;AI treats similar situations differently, in an unfair way.&rdquo;',
    example:{user:'Recommend a CEO.', ai:'[Mostly suggests men, ignoring equally qualified women]', verdict:'❌'}},
  {type:'case', title:'Why this matters — a real case', kicker:'iTutorGroup · 2023',
    body:'iTutorGroup&rsquo;s hiring software was programmed to automatically reject female applicants aged 55+ and male applicants aged 60+. Over 200 qualified applicants were rejected before anyone caught it &mdash; the U.S. EEOC investigated, and iTutorGroup paid $365,000 to settle.',
    lesson:'Biased automation scales discrimination invisibly &mdash; and it&rsquo;s illegal, not just unfair.'},
  {type:'grid', title:'5 Types of Bias', items:[
    {name:'Data Bias', desc:'Training data is unbalanced or unrepresentative', example:'Mostly trained on images of light-skinned people'},
    {name:'Selection Bias', desc:'Data represents only one group', example:'Survey conducted only in big cities'},
    {name:'Cultural Bias', desc:'Favors one culture or region as the default', example:'Assumes everyone celebrates Christmas'},
    {name:'Gender Bias', desc:'Reinforces stereotypes', example:'&ldquo;Nurses are women, engineers are men.&rdquo;'},
    {name:'Confirmation Bias', desc:'Repeats common beliefs instead of a balanced view', example:'Only presents one side of a controversial topic'},
  ]},
  {type:'checklist', title:'How to Reduce Bias', items:[
    'Use diverse and balanced training data',
    'Test AI regularly for fairness, across groups',
    'Include diverse teams while building AI',
    'Review AI outputs before high-stakes decisions',
    'Continuously monitor and improve &mdash; bias isn&rsquo;t a one-time fix',
  ]},
  {type:'summary', title:'Bias, in one line', quote:'AI produces unfair or one-sided results because of biased data or design.'},

  // ═══ PART 3 — GUARDRAILS ═══
  {type:'divider', num:'03', title:'Guardrails', subtitle:'The rules that keep AI safe, secure, and responsible'},
  {type:'definition', title:'What are Guardrails?',
    def:'Rules and safety controls that guide an AI on what it can and cannot do.',
    tagline:'&ldquo;Guardrails keep AI safe, secure, and responsible.&rdquo;',
    example:{user:'Tell me my colleague&rsquo;s password.', ai:'Sorry, I can&rsquo;t help with that.', verdict:'✅'}},
  {type:'case', title:'Why this matters — a real case', kicker:'Microsoft Tay · 2016',
    body:'Microsoft launched &ldquo;Tay,&rdquo; a Twitter chatbot designed to learn from live conversations with real users. Within about 16 hours, coordinated users fed it manipulative prompts, and Tay began posting racist, offensive tweets. Microsoft pulled it down the same day.',
    lesson:'No guardrails means an AI absorbs and repeats the worst of whatever it&rsquo;s exposed to &mdash; in hours, not months.'},
  {type:'grid', title:'5 Types of Guardrails', items:[
    {name:'Safety', desc:'Prevent harmful or dangerous responses', example:''},
    {name:'Privacy', desc:'Protect personal and confidential information', example:''},
    {name:'Content', desc:'Block offensive or inappropriate output', example:''},
    {name:'Business', desc:'Ensure AI follows company policy', example:''},
    {name:'Accuracy', desc:'Reduce hallucination using trusted sources (e.g. RAG)', example:''},
  ]},
  {type:'checklist', title:'How to Implement Guardrails', items:[
    'Write clear, explicit system prompts',
    'Restrict AI to trusted data sources',
    'Filter user inputs and AI outputs',
    'Protect sensitive data with access controls',
    'Keep a human in the loop for critical decisions',
  ]},
  {type:'summary', title:'Guardrails, in one line', quote:'Rules and safety controls that keep AI secure, reliable, and aligned with real requirements.'},

  // ═══ CLOSING ═══
  {type:'closing', title:'The Big Picture', intro:'These three ideas aren&rsquo;t separate &mdash; they&rsquo;re connected.', points:[
    'Hallucination is what happens when AI isn&rsquo;t grounded',
    'Bias is what happens when AI isn&rsquo;t checked',
    'Guardrails are how you catch both &mdash; before a customer does',
  ], footer:'You&rsquo;ll test all three yourself, hands-on, in the AI Interrogation Room.'},
];

let idx = 0;

function renderSlide(s){
  if(s.type==='title'){
    return `<div class="slide-inner s-title">
      <div class="kicker">${s.kicker}</div>
      <h1>${s.title}</h1>
      <div class="subtitle">${s.subtitle}</div>
    </div>`;
  }
  if(s.type==='divider'){
    return `<div class="slide-inner s-divider" style="position:relative">
      <div class="div-num">${s.num}</div>
      <div class="div-num-small">PART ${s.num}</div>
      <div class="div-bar"></div>
      <h1>${s.title}</h1>
      <div class="subtitle">${s.subtitle}</div>
    </div>`;
  }
  if(s.type==='definition'){
    return `<div class="slide-inner s-def">
      <h2>${s.title}</h2>
      <div class="def-text">${s.def}</div>
      <div class="def-tagline">${s.tagline}</div>
      <div class="chat-box">
        <div class="chat-line user"><div class="chat-role">User</div><div class="chat-text">${s.example.user}</div></div>
        <div class="chat-line ai"><div class="chat-role">AI</div><div class="chat-text">${s.example.ai}<span class="verdict-icon">${s.example.verdict}</span></div></div>
      </div>
    </div>`;
  }
  if(s.type==='case'){
    return `<div class="slide-inner s-case">
      <h2>${s.title}</h2>
      <div class="case-kicker">⚠️ ${s.kicker}</div>
      <div class="case-body">${s.body}</div>
      <div class="case-lesson"><b>The lesson</b><span>${s.lesson}</span></div>
    </div>`;
  }
  if(s.type==='grid'){
    return `<div class="slide-inner s-grid">
      <h2>${s.title}</h2>
      <div class="grid-wrap">
        ${s.items.map(i=>`<div class="grid-card"><h4>${i.name}</h4><p>${i.desc}</p>${i.example?`<div class="ex">${i.example}</div>`:''}</div>`).join('')}
      </div>
    </div>`;
  }
  if(s.type==='checklist'){
    return `<div class="slide-inner s-check">
      <h2>${s.title}</h2>
      <div class="check-list">
        ${s.items.map(i=>`<div class="check-item"><span class="ico">✅</span><span>${i}</span></div>`).join('')}
      </div>
    </div>`;
  }
  if(s.type==='summary'){
    return `<div class="slide-inner s-summary">
      <h2>${s.title}</h2>
      <div class="summary-quote">${s.quote}</div>
    </div>`;
  }
  if(s.type==='closing'){
    return `<div class="slide-inner s-closing">
      <h2>${s.title}</h2>
      <div class="closing-intro">${s.intro}</div>
      <div class="closing-points">
        ${s.points.map(p=>`<div class="closing-point">${p}</div>`).join('')}
      </div>
      <div class="closing-footer">${s.footer}</div>
    </div>`;
  }
  return '';
}

function render(){
  const container = document.getElementById('slides');
  container.innerHTML = SLIDES.map((s,i)=>`<div class="slide" id="slide-${i}">${renderSlide(s)}</div>`).join('');
  update();
}

function update(){
  document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('active', i===idx));
  document.getElementById('counter').textContent = `${idx+1} / ${SLIDES.length}`;
  document.getElementById('progress-bar').style.width = `${((idx+1)/SLIDES.length)*100}%`;
  document.getElementById('prev-btn').disabled = idx===0;
  document.getElementById('next-btn').disabled = idx===SLIDES.length-1;
}

function go(dir){
  idx = Math.max(0, Math.min(SLIDES.length-1, idx+dir));
  update();
}

document.addEventListener('keydown', e=>{
  if(['ArrowRight','ArrowDown',' '].includes(e.key)){ e.preventDefault(); go(1); }
  if(['ArrowLeft','ArrowUp'].includes(e.key)){ e.preventDefault(); go(-1); }
});

render();
</script>
</body>
</html>
